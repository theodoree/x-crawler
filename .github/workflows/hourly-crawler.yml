name: Hourly X Crawler

on:
  # 定时任务 - 每1小时运行一次
  schedule:
    - cron: '0 */1 * * *'  # 每1小时的整点运行 (00:00, 01:00, 02:00, ...)

  # 手动触发
  workflow_dispatch:
    inputs:
      tweet_count:
        description: '要爬取的推文数量'
        required: false
        default: '100'

jobs:
  crawl-only:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # 允许推送代码

    steps:
      # 1. 检出代码
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安装 Python 依赖
      - name: 📚 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 安装 Playwright 和系统依赖
      - name: 🎭 Install Playwright with dependencies
        run: |
          playwright install --with-deps chromium

      # 5. 配置环境变量
      - name: ⚙️ Configure environment
        run: |
          cat > .env << EOF
          # X平台认证
          X_AUTH_TOKEN=${{ secrets.X_AUTH_TOKEN }}
          X_CT0_TOKEN=${{ secrets.X_CT0_TOKEN }}
          X_CSRF_TOKEN=${{ secrets.X_CSRF_TOKEN }}
          X_BEARER_TOKEN=${{ secrets.X_BEARER_TOKEN }}

          # LLM配置 (抓取不需要，但配置文件可能需要)
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_MODEL=${{ secrets.OPENAI_MODEL }}

          # 代理配置 (可选)
          HTTP_PROXY=${{ secrets.HTTP_PROXY }}
          HTTPS_PROXY=${{ secrets.HTTPS_PROXY }}

          # 飞书通知
          FEISHU_WEBHOOK=${{ secrets.FEISHU_WEBHOOK }}

          # 爬虫配置
          REQUESTS_PER_HOUR=400
          DAILY_TWEET_COUNT=100
          DATA_DIR=crawler_data
          EOF

      # 6. 运行爬虫 (只抓取，不生成总结)
      - name: 🕷️ Crawl tweets (no summary)
        run: |
          TWEET_COUNT="${{ github.event.inputs.tweet_count || '100' }}"
          echo "抓取 $TWEET_COUNT 条推文 (不生成总结)"
          python run_crawler.py --count $TWEET_COUNT
        continue-on-error: true

      # 7. 生成运行报告
      - name: 📊 Generate report
        if: always()
        run: |
          echo "## 🤖 抓取运行报告" > report.md
          echo "" >> report.md
          echo "- 🕐 运行时间: $(date +'%Y-%m-%d %H:%M:%S')" >> report.md
          echo "- 🎯 目标数量: ${{ github.event.inputs.tweet_count || '100' }} 条" >> report.md
          echo "- ⚡ 任务类型: 数据抓取 (不生成总结)" >> report.md
          echo "" >> report.md

          # 统计生成的文件
          if [ -d "crawler_data/users_daily" ]; then
            USER_COUNT=$(ls -1 crawler_data/users_daily/*.json 2>/dev/null | wc -l)
            echo "- 👥 用户数据文件: $USER_COUNT 个" >> report.md
          fi

          if [ -d "crawler_data/daily_posts" ]; then
            POST_COUNT=$(ls -1 crawler_data/daily_posts/*.json 2>/dev/null | wc -l)
            echo "- 📝 日志文件: $POST_COUNT 个" >> report.md
          fi

          cat report.md

      # 8. 提交数据到仓库
      - name: 💾 Commit and push data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # 只添加爬虫数据文件
          git add crawler_data/

          # 检查是否有变更
          if git diff --staged --quiet; then
            echo "没有新数据需要提交"
          else
            git commit -m "🤖 抓取更新: $(date +'%Y-%m-%d %H:%M') 数据"
            git push
          fi

      # 9. 上传运行报告
      - name: 📤 Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawler-report-${{ github.run_number }}
          path: |
            report.md
            crawler_data/daily_posts/*.json
          retention-days: 7

      # 10. 失败通知
      - name: 🐛 Create Issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Hourly Crawler Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## 抓取失败报告

              **时间**: ${new Date().toLocaleString('zh-CN', { timeZone: 'Asia/Shanghai' })}
              **工作流**: ${context.workflow}

              🔗 [查看运行日志](${context.payload.repository.html_url}/actions/runs/${context.runId})

              ### 可能原因
              - [ ] X 认证 token 过期
              - [ ] 网络连接问题
              - [ ] API 限流

              ---
              *此 Issue 由 GitHub Actions 自动创建*`,
              labels: ['bot', 'crawler-failure']
            });
